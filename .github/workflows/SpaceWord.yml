name: SpaceWord

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: Scan secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Ca clone sur la machine du runner GitHub.
        uses: actions/checkout@v4

      - name: Installe Node.js sur la machine du runner GitHub.
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cava dans le dosier ca installe est ca fais les tests.
        run: |
          cd SpaceWord
          npm install
          npm test

  push_to_mirror:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push vers le miroir Epitech
        env:
          MIRROR_URL: https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/EpitechWebAcademiePromo202/W-DOP-200-MLN-2-1-jeux_videops-2.git
        run: |
          mkdir /tmp/m
          cp -r SpaceWord /tmp/m/
          cd /tmp/m
          git init
          git config user.email "ci@github.com"
          git config user.name "CI"
          git add .
          git commit -m "mirror"
          git remote add mirror $MIRROR_URL
          git push --force mirror HEAD:main

  notify_discord:
    name: "notify discord"
    runs-on: ubuntu-latest
    needs: [secret-scan, test, push_to_mirror]
    if: always()
    steps:
      - name: "send discord notification"
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            COLOR=3066993
            STATUS="✅ Success"
          else
            COLOR=15158332
            STATUS="❌ Failure"
          fi
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$STATUS — ${{ github.repository }}\",
                   \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** \`${{ github.sha }}\`\n**Triggered by:** ${{ github.actor }}\",
                   \"color\": $COLOR,
                   \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

