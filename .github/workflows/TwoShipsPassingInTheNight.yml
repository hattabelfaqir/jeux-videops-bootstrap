# test push 2026-04-15
name: TwoShipsPassingInTheNight

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install and test
        run: |
          cd TwoShipsPassingInTheNight
          npm install
          npm test

  push-to-epitech:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to Epitech
        run: |
          git remote add epitech git@github.com:EpitechWebAcademiePromo2027/W-DOP-200-MLN-2-1-jeux_videops-2.git
          GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key" git push epitech HEAD:main