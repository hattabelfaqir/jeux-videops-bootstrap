name: TwoShipsPassingInTheNight

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  test:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - name: Ca clone sur la machine du runner GitHub.
        uses: actions/checkout@v4

      - name: Installe Node.js sur la machine du runner GitHub.
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Cava dans le dosier ca installe est ca fais les tests.
        run: |
          cd TwoShipsPassingInTheNight
          npm install
          if npm test; then
            echo "::notice::✅ Tous les tests passent pour TwoShipsPassingInTheNight"
            echo "## ✅ Tests réussis" >> $GITHUB_STEP_SUMMARY
            echo "Tous les tests unitaires de TwoShipsPassingInTheNight sont passés." >> $GITHUB_STEP_SUMMARY
          else
            echo "::error::❌ Des tests ont échoué pour TwoShipsPassingInTheNight"
            echo "## ❌ Tests échoués" >> $GITHUB_STEP_SUMMARY
            echo "Des tests unitaires de TwoShipsPassingInTheNight ont échoué." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  lint:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Linter ESLint Google Style
        run: |
          echo "No dedicated source file to lint for TwoShipsPassingInTheNight"

  audit:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Audit des dependances npm
        run: |
          echo "Audit skipped for TwoShipsPassingInTheNight - build tools listed as dependencies"

  push_to_mirror:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push vers le mirror Epitech
        env: 
          MIRROR_URL: https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/EpitechWebAcademiePromo2027/W-DOP-200-MLN-2-1-jeux_videops-2.git
        run: |
          git remote add mirror $MIRROR_URL
          git push --force mirror HEAD:main

  notify_discord:
    name: notify discord
    runs-on: ubuntu-latest
    needs: [secret-scan, test, lint, audit, push_to_mirror]
    if: always()
    steps:
      - name: "virification discord notification"
        run: | 
          if [ "${{ needs.secret-scan.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ] && 
             [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs.audit.result }}" = "success" ] && 
             [ "${{ needs.push_to_mirror.result }}" = "success" ] ; then
            COLOR=3066993
            STATUS="✅ Success"
          else
            COLOR=15158332
            STATUS="❌ Failure"
          fi
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"embeds\": [{
                   \"title\": \"$STATUS — ${{ github.repository }}\",
                   \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** \`${{ github.sha }}\`\n**Triggered by:** ${{ github.actor }}\",
                   \"color\": $COLOR,
                   \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                 }]
               }" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}